<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hand Gesture Recognition</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="container">

        <h1>🖐 Hand Gesture Recognition System</h1>

        <div class="video-box">

            <img src="/video" alt="Live Camera Feed">

        </div>

        <div class="gesture-box">

            <h2>Supported Gestures</h2>

            <table>

                <tr>
                    <th>Gesture</th>
                    <th>Action</th>
                </tr>

                <tr>
                    <td>✋ Palm</td>
                    <td>Take Screenshot</td>
                </tr>

                <tr>
                    <td>👊 Fist</td>
                    <td>Mouse Left Click</td>
                </tr>

                <tr>
                    <td>👍 Thumbs Up</td>
                    <td>Volume Up</td>
                </tr>

                <tr>
                    <td>👎 Thumbs Down</td>
                    <td>Volume Down</td>
                </tr>

                <tr>
                    <td>👉 Index Right</td>
                    <td>Move Cursor Right</td>
                </tr>

                <tr>
                    <td>👈 Index Left</td>
                    <td>Move Cursor Left</td>
                </tr>

                <tr>
                    <td>🚫 No Gesture</td>
                    <td>No Action</td>
                </tr>

            </table>

        </div>

    </div>

</body>

</html>
